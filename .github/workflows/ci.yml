name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            services/orchestrator/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Install orchestrator dependencies
        run: npm ci --prefix services/orchestrator
      - name: Validate product, API, and build
        run: npm run check
